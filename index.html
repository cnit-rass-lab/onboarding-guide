<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CNIT RaSS Lab · GitHub Onboarding Guide</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css" integrity="sha512-8X0QpW1xw6Cb7F3R2XNqlULvyl6tXWSm7Edq9VlytYm9DNNrwCzdaEuBcdQWqf4wxGuQ2C4Na+FtNaK8+Z9w4g==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
      :root {
        color-scheme: light dark;
        --bg: #f7f7f9;
        --card-bg: #ffffff;
        --text: #1f2933;
        --subtext: #4b5563;
        --border: rgba(15, 23, 42, 0.12);
        --shadow: 0 30px 60px rgba(15, 23, 42, 0.08);
        --code-bg: #f5f7fa;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0f172a;
          --card-bg: #111827;
          --text: #e5e7eb;
          --subtext: #94a3b8;
          --border: rgba(148, 163, 184, 0.2);
          --shadow: 0 30px 60px rgba(15, 23, 42, 0.5);
          --code-bg: #1f2937;
        }
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: radial-gradient(circle at top left, rgba(99, 102, 241, 0.12), transparent 40%),
          radial-gradient(circle at bottom right, rgba(16, 185, 129, 0.12), transparent 45%),
          var(--bg);
        color: var(--text);
        min-height: 100vh;
        display: flex;
        align-items: flex-start;
        justify-content: center;
        padding: clamp(24px, 5vw, 64px) clamp(16px, 5vw, 64px);
      }

      .container {
        width: min(960px, 100%);
        background: var(--card-bg);
        border-radius: 24px;
        border: 1px solid var(--border);
        box-shadow: var(--shadow);
        padding: clamp(24px, 4vw, 40px) clamp(20px, 4vw, 40px);
        position: relative;
        overflow: hidden;
      }

      .container::before,
      .container::after {
        content: '';
        position: absolute;
        border-radius: 999px;
        filter: blur(90px);
        opacity: 0.25;
        z-index: 0;
      }

      .container::before {
        width: 240px;
        height: 240px;
        background: linear-gradient(135deg, rgba(99, 102, 241, 0.55), rgba(129, 140, 248, 0.35));
        top: -120px;
        right: -120px;
      }

      .container::after {
        width: 280px;
        height: 280px;
        background: linear-gradient(135deg, rgba(16, 185, 129, 0.5), rgba(34, 197, 94, 0.35));
        bottom: -140px;
        left: -140px;
      }

      .content {
        position: relative;
        z-index: 1;
        color: inherit;
      }

      .top-bar {
        position: relative;
        z-index: 1;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 24px;
      }

      .top-title {
        font-size: 0.95rem;
        font-weight: 500;
        letter-spacing: 0.03em;
        text-transform: uppercase;
        color: var(--subtext);
        display: flex;
        align-items: center;
        gap: 8px;
        white-space: nowrap;
      }

      .top-title-dot {
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: linear-gradient(135deg, #6366f1, #22c55e);
        box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.18);
      }

      .language-switch {
        display: inline-flex;
        padding: 4px;
        border-radius: 999px;
        background: rgba(148, 163, 184, 0.18);
        border: 1px solid rgba(148, 163, 184, 0.4);
        box-shadow: 0 10px 25px rgba(15, 23, 42, 0.12);
      }

      .lang-button {
        position: relative;
        border: none;
        background: transparent;
        color: var(--subtext);
        padding: 6px 14px;
        border-radius: 999px;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-size: 0.82rem;
        font-weight: 500;
        cursor: pointer;
        transition: color 0.18s ease, background 0.18s ease, transform 0.12s ease;
      }

      .lang-button span.flag {
        width: 18px;
        height: 18px;
        border-radius: 999px;
        overflow: hidden;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        background: #0f172a;
        box-shadow: 0 0 0 1px rgba(148, 163, 184, 0.6);
      }

      .lang-button span.flag img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      .lang-button span.label {
        letter-spacing: 0.03em;
        text-transform: uppercase;
      }

      .lang-button.active {
        color: var(--text);
        background: #ffffff;
        box-shadow: 0 8px 20px rgba(15, 23, 42, 0.22);
      }

      @media (prefers-color-scheme: dark) {
        .lang-button.active {
          background: #020617;
        }
      }

      .lang-button:hover:not(.active) {
        background: rgba(15, 23, 42, 0.03);
        transform: translateY(-1px);
      }

      .lang-button:focus-visible {
        outline: 2px solid #6366f1;
        outline-offset: 2px;
      }

      @media (max-width: 640px) {
        .top-bar {
          flex-direction: column;
          align-items: flex-start;
        }
      }

      .loading {
        font-size: 1rem;
        color: var(--subtext);
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .loading::before {
        content: '';
        width: 18px;
        height: 18px;
        border-radius: 50%;
        border: 3px solid rgba(99, 102, 241, 0.2);
        border-top-color: rgba(99, 102, 241, 0.8);
        animation: spin 1s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .markdown-body h1,
      .markdown-body h2,
      .markdown-body h3,
      .markdown-body h4,
      .markdown-body h5,
      .markdown-body h6 {
        font-weight: 700;
        line-height: 1.2;
        margin-top: 2.4em;
        margin-bottom: 0.6em;
        scroll-margin-top: 120px;
      }

      .markdown-body h1:first-child {
        margin-top: 0;
        font-size: clamp(2.6rem, 4vw, 3.2rem);
        letter-spacing: -0.02em;
      }

      .markdown-body p,
      .markdown-body ul,
      .markdown-body ol,
      .markdown-body blockquote,
      .markdown-body table {
        margin-top: 1.1em;
        margin-bottom: 1.1em;
        color: var(--text);
        line-height: 1.75;
      }

      .markdown-body ul,
      .markdown-body ol {
        padding-left: 1.4em;
      }

      .markdown-body blockquote {
        border-left: 4px solid rgba(99, 102, 241, 0.35);
        padding-left: 1.25em;
        color: var(--subtext);
        font-style: italic;
        background: rgba(99, 102, 241, 0.06);
        border-radius: 12px;
      }

      .markdown-body table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.95rem;
        overflow: hidden;
        border-radius: 16px;
        background: rgba(148, 163, 184, 0.08);
      }

      .markdown-body th,
      .markdown-body td {
        padding: 12px 16px;
        border: 1px solid rgba(148, 163, 184, 0.25);
        text-align: left;
      }

      .markdown-body th {
        background: rgba(99, 102, 241, 0.12);
        font-weight: 600;
      }

      .markdown-body a {
        color: #6366f1;
        font-weight: 500;
        text-decoration: none;
      }

      .markdown-body a:hover {
        text-decoration: underline;
      }

      .markdown-body code {
        font-family: 'JetBrains Mono', 'Fira Code', 'SFMono-Regular', ui-monospace, 'SFMono-Regular', Menlo, Monaco, Consolas,
          'Liberation Mono', 'Courier New', monospace;
        background: var(--code-bg);
        padding: 0.2em 0.4em;
        border-radius: 6px;
        font-size: 0.9em;
      }

      .markdown-body pre {
        background: var(--code-bg);
        padding: 16px;
        border-radius: 16px;
        overflow: auto;
      }

      .markdown-body pre code {
        background: transparent;
        padding: 0;
        font-size: 0.95rem;
      }

      .markdown-body img {
        max-width: 100%;
        border-radius: 16px;
        margin: 1.5em 0;
        box-shadow: 0 16px 40px rgba(15, 23, 42, 0.16);
      }

      .error {
        padding: 16px 20px;
        border-radius: 12px;
        background: rgba(239, 68, 68, 0.1);
        color: #b91c1c;
        border: 1px solid rgba(239, 68, 68, 0.2);
        font-weight: 500;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="top-bar" aria-label="Language selector">
        <div class="top-title">
          <span class="top-title-dot"></span>
          CNIT RaSS Lab · GitHub onboarding guide
        </div>
        <div class="language-switch" role="radiogroup" aria-label="Language">
          <button
            class="lang-button active"
            data-lang="en"
            role="radio"
            aria-checked="true"
          >
            <span class="flag">
              <img src="flag_en.png" alt="English flag" />
            </span>
            <span class="label">English</span>
          </button>
          <button
            class="lang-button"
            data-lang="it"
            role="radio"
            aria-checked="false"
          >
            <span class="flag">
              <img src="flag_it.png" alt="Bandiera italiana" />
            </span>
            <span class="label">Italiano</span>
          </button>
        </div>
      </div>
      <div id="content" class="content">
        <div class="loading">Loading the guide…</div>
      </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/11.2.0/marked.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js" integrity="sha512-vhyDb5zu/7YcJyVOVRyL5ol1FgZJzmT87j8YNJjY37YP5ARByaYCNVQeBg7CIJMkeb0tcUtwiYYyuWI3wRB7iw==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script>
      const content = document.getElementById('content');
      const langButtons = document.querySelectorAll('.lang-button');

      function getReadmeForLang(lang) {
        return lang === 'it' ? 'README.it.md' : 'README.md';
      }

      function getLoadingText(lang) {
        return lang === 'it' ? 'Caricamento della guida in corso…' : 'Loading the guide…';
      }

      function getErrorText(lang, status) {
        if (lang === 'it') {
          return `Impossibile caricare il file README (${status})`;
        }
        return `Unable to load README file (status ${status})`;
      }

      function setActiveLanguage(lang) {
        document.documentElement.lang = lang === 'it' ? 'it' : 'en';
        langButtons.forEach((btn) => {
          const isActive = btn.dataset.lang === lang;
          btn.classList.toggle('active', isActive);
          btn.setAttribute('aria-checked', isActive ? 'true' : 'false');
        });
      }

      async function loadMarkdown(lang) {
        const selectedLang = lang === 'it' ? 'it' : 'en';
        setActiveLanguage(selectedLang);
        localStorage.setItem('rass-onboarding-lang', selectedLang);

        content.classList.remove('markdown-body');
        content.innerHTML = `<div class="loading">${getLoadingText(selectedLang)}</div>`;

        const readmePath = getReadmeForLang(selectedLang);

        try {
          const response = await fetch(readmePath);
          if (!response.ok) {
            throw new Error(getErrorText(selectedLang, response.status));
          }
          const text = await response.text();
          marked.setOptions({
            breaks: true,
            gfm: true,
            highlight: function (code, lang) {
              if (lang && hljs.getLanguage(lang)) {
                return hljs.highlight(code, { language: lang }).value;
              }
              return hljs.highlightAuto(code).value;
            },
          });
          const html = marked.parse(text);
          content.classList.add('markdown-body');
          content.innerHTML = html;
        } catch (error) {
          console.error(error);
          content.innerHTML = `<div class="error">${error.message}</div>`;
        }
      }

      langButtons.forEach((btn) => {
        btn.addEventListener('click', () => {
          const lang = btn.dataset.lang || 'en';
          loadMarkdown(lang);
        });
      });

      const savedLang = localStorage.getItem('rass-onboarding-lang') || 'en';
      loadMarkdown(savedLang);
    </script>
  </body>
</html>
